name: Ejecutar Pruebas E2E (Selenium)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Permisos necesarios para que el bot pueda subir el reporte a la rama gh-pages
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Usa la versión de .NET que tengas en tu proyecto
        dotnet-version: '10.0.x' 

    - name: Restaurar dependencias
      run: dotnet restore

    - name: Compilar proyecto
      run: dotnet build --no-restore

    - name: Ejecutar pruebas
      env:
        CI: true
      # continue-on-error asegura que el pipeline no se detenga bruscamente si una prueba falla,
      # permitiendo que los siguientes pasos (generar y subir el reporte) se ejecuten.
      continue-on-error: true
      run: dotnet test --no-build --verbosity normal

    # --- NUEVOS PASOS PARA GITHUB PAGES ---

    - name: Preparar carpeta publica para GitHub Pages
      if: always()
      run: |
        # Creamos una carpeta llamada public
        mkdir public
        # Copiamos el reporte allí y lo renombramos a index.html
        cp **/Reports/ReportePruebas.html public/index.html

    - name: Desplegar a GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages # Se creará esta rama automáticamente